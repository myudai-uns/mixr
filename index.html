<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Mixr — 席順ジェネレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      fontFamily: { sans: ['Inter','Noto Sans JP','system-ui','sans-serif'] },
      colors: {
        ink: '#0b1220',
        navy: { 50:'#eef2f9', 600:'#1e3a8a', 700:'#172554', 900:'#0b1d4f'},
        teal: { 500:'#14b8a6', 600:'#0d9488' },
      },
      boxShadow: {
        card: '0 1px 2px rgba(15,23,42,.05), 0 4px 16px rgba(15,23,42,.06)',
        soft: '0 2px 12px rgba(15,23,42,.08)',
      },
    }},
  };
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
<script src="https://unpkg.com/lucide@0.438.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
  html, body { overflow-x: hidden; }
  body { font-family: 'Inter','Noto Sans JP', system-ui, sans-serif; background:#f8fafc; color:#0b1220; -webkit-text-size-adjust:100%; }
  @media print {
    body { background:#fff; }
    .no-print { display:none !important; }
    .print-page { break-after: page; page-break-after: always; }
    .print-page:last-child { break-after: auto; page-break-after: auto; }
  }
  .chair {
    position:absolute; display:flex; align-items:center; justify-content:center;
    font-weight:700; box-shadow: 0 1px 3px rgba(15,23,42,.12);
    transform: translate(-50%,-50%); border-radius: 10px;
  }
  .chair-filled { background: linear-gradient(180deg,#1e3a8a,#0b1d4f); color:#fff; }
  .chair-empty  { background:#f1f5f9; color:#94a3b8; border:2px dashed #cbd5e1; font-weight:500; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* ---------- helpers ---------- */
const STORAGE_KEY = 'mixr-app-state-v3';
const DEFAULT_SETTINGS = { participantCount:31, groupSize:6, groupCount:6, roundCount:3 };
const TABLE_LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
// アルファベット別の色（CDN JIT検出のため static 文字列で列挙）
const LETTER_COLORS = [
  'text-rose-500','text-amber-500','text-emerald-500','text-sky-500',
  'text-violet-500','text-orange-500','text-teal-500','text-indigo-500',
  'text-pink-500','text-lime-600','text-cyan-500','text-fuchsia-500',
];
const letterColor = (letter) => letter ? LETTER_COLORS[(letter.charCodeAt(0)-65) % LETTER_COLORS.length] : 'text-slate-300';
const pad2 = n => String(n).padStart(2,'0');
const uid = () => Math.random().toString(36).slice(2,10);
const pairKey = (a,b) => a<b ? `${a}-${b}` : `${b}-${a}`;

function makeOneRound(pIds, groupCount, groupSize) {
  const arr = [...pIds];
  for (let i=arr.length-1; i>0; i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  const groups = Array.from({length: groupCount}, () => []);
  arr.forEach((id, idx) => groups[idx % groupCount].push(id));
  groups.forEach(g => { while (g.length < groupSize) g.push(null); });
  return groups;
}
function generateRounds(participantCount, settings) {
  const pIds = Array.from({length: participantCount}, (_,i) => i+1);
  const { groupCount, groupSize, roundCount } = settings;
  const pairCount = {}, tableVisits = {};
  pIds.forEach(id => { tableVisits[id] = {}; });
  const rounds = [];
  for (let r=0; r<roundCount; r++) {
    let best = null, bestScore = Infinity;
    for (let trial=0; trial<120; trial++) {
      const cand = makeOneRound(pIds, groupCount, groupSize);
      let ps = 0, ts = 0;
      for (const g of cand) {
        const ids = g.filter(x => x !== null);
        for (let i=0;i<ids.length;i++) for (let j=i+1;j<ids.length;j++)
          ps += (pairCount[pairKey(ids[i],ids[j])] || 0);
      }
      cand.forEach((g, gi) => g.forEach(id => { if (id !== null) ts += (tableVisits[id][gi] || 0); }));
      const total = ps*2 + ts;
      if (total < bestScore) { bestScore = total; best = cand; if (total === 0) break; }
    }
    for (const g of best) {
      const ids = g.filter(x => x !== null);
      for (let i=0;i<ids.length;i++) for (let j=i+1;j<ids.length;j++) {
        const k = pairKey(ids[i],ids[j]); pairCount[k] = (pairCount[k]||0)+1;
      }
    }
    best.forEach((g, gi) => g.forEach(id => { if (id !== null) tableVisits[id][gi] = (tableVisits[id][gi]||0)+1; }));
    rounds.push({
      id: uid(), name: `ラウンド ${r+1}`,
      groups: best.map((seats, gi) => ({ id: uid(), name: `テーブル ${TABLE_LETTERS[gi]}`, seats })),
    });
  }
  return rounds;
}

function chairPositions(N, W, H, tableW, tableH) {
  const cx = W/2, cy = H/2, margin = 22, out = [];
  if (N <= 6) {
    const top = Math.ceil(N/2), bot = N - top;
    const place = (count, y) => {
      for (let i=0;i<count;i++) { const r = count===1 ? .5 : i/(count-1); out.push({x: cx-tableW/2 + r*tableW, y}); }
    };
    place(top, cy - tableH/2 - margin);
    place(bot, cy + tableH/2 + margin);
  } else {
    const sideCap = Math.min(2, Math.floor((N-4)/2));
    const remain = N - sideCap*2;
    const top = Math.ceil(remain/2), bot = remain - top;
    for (let i=0;i<top;i++){ const r = top===1?.5:i/(top-1); out.push({x: cx-tableW/2 + r*tableW, y: cy-tableH/2-margin}); }
    for (let i=0;i<bot;i++){ const r = bot===1?.5:i/(bot-1); out.push({x: cx-tableW/2 + r*tableW, y: cy+tableH/2+margin}); }
    for (let i=0;i<sideCap;i++){
      const r = sideCap===1?.5:i/(sideCap-1);
      out.push({x: cx-tableW/2-margin, y: cy-tableH/2 + r*tableH});
      out.push({x: cx+tableW/2+margin, y: cy-tableH/2 + r*tableH});
    }
  }
  return out;
}

const Icon = ({name, className='w-4 h-4'}) => {
  const ref = useRef(null);
  useEffect(() => { if(ref.current && window.lucide) window.lucide.createIcons({nameAttr:'data-lucide',icons:window.lucide.icons}); }, [name]);
  return <i ref={ref} data-lucide={name} className={className}></i>;
};

/* ---------- App (single component) ---------- */
function App() {
  const initial = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch { return null; } })();
  const [settings, setSettings] = useState({...DEFAULT_SETTINGS, ...(initial?.settings || {})});
  const [rounds, setRounds] = useState(initial?.rounds || []);
  const [currentRound, setCurrentRound] = useState(initial?.currentRound ?? 0);
  const [exporting, setExporting] = useState(false);
  const [toast, setToast] = useState(null);
  const sheetRef = useRef(null);

  useEffect(() => {
    const auto = Math.max(1, Math.ceil(settings.participantCount / settings.groupSize));
    if (auto !== settings.groupCount) setSettings(s => ({...s, groupCount: auto}));
  }, [settings.participantCount, settings.groupSize]);

  useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({settings, rounds, currentRound})); } catch {} },
    [settings, rounds, currentRound]);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null), 2000); };
  const set = patch => setSettings({...settings, ...patch});

  const onGenerate = () => {
    setRounds(generateRounds(settings.participantCount, settings));
    setCurrentRound(0);
    showToast('席順を生成しました');
  };
  const resetAll = () => {
    if (!confirm('全データをリセットしますか？')) return;
    localStorage.removeItem(STORAGE_KEY);
    setSettings(DEFAULT_SETTINGS); setRounds([]); setCurrentRound(0);
  };
  const moveSeat = (rid, fromGid, fromIdx, toGid, toIdx) => {
    setRounds(rounds.map(r => {
      if (r.id !== rid) return r;
      const groups = r.groups.map(g => ({...g, seats:[...g.seats]}));
      const fg = groups.find(g=>g.id===fromGid), tg = groups.find(g=>g.id===toGid);
      const t = fg.seats[fromIdx]; fg.seats[fromIdx] = tg.seats[toIdx]; tg.seats[toIdx] = t;
      return {...r, groups};
    }));
  };
  const exportPDF = async () => {
    if (rounds.length === 0) return;
    setExporting(true);
    await new Promise(r => setTimeout(r, 50)); // 描画反映を待つ
    try {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
      const pages = sheetRef.current.querySelectorAll('.print-page');
      for (let i=0; i<pages.length; i++) {
        const canvas = await html2canvas(pages[i], {scale:2, backgroundColor:'#ffffff', useCORS:true});
        const pdfW = pdf.internal.pageSize.getWidth(), pdfH = pdf.internal.pageSize.getHeight();
        const iw = canvas.width*0.264583, ih = canvas.height*0.264583;
        const ratio = Math.min(pdfW/iw, pdfH/ih);
        const w = iw*ratio, h = ih*ratio;
        if (i>0) pdf.addPage();
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', (pdfW-w)/2, (pdfH-h)/2, w, h);
      }
      pdf.save('mixr-seating.pdf');
    } finally { setExporting(false); }
  };

  const total = settings.groupCount * settings.groupSize;
  const empties = Math.max(0, total - settings.participantCount);
  const shortfall = settings.participantCount - total;

  const journey = useMemo(() => {
    const map = {};
    for (let pid=1; pid<=settings.participantCount; pid++) map[pid] = new Array(rounds.length).fill(null);
    rounds.forEach((round, ri) => round.groups.forEach((group, gi) => {
      const m = group.name.match(/[A-Z]+$/);
      const letter = m ? m[0] : (TABLE_LETTERS[gi] || String(gi+1));
      group.seats.forEach(sid => { if (sid !== null && map[sid]) map[sid][ri] = letter; });
    }));
    return map;
  }, [rounds, settings.participantCount]);

  const onChairClick = (round, group, idx) => {
    const labels = round.groups.map(g => g.name);
    const tname = prompt(`移動先テーブル名 (${labels.join(', ')})`, group.name);
    if (!tname) return;
    const tg = round.groups.find(g => g.name === tname.trim());
    if (!tg) { alert('テーブルが見つかりません'); return; }
    const seatNum = parseInt(prompt(`${tg.name} の何席目と入れ替えますか？ (1〜${tg.seats.length})`, '1'), 10);
    if (isNaN(seatNum) || seatNum<1 || seatNum>tg.seats.length) return;
    moveSeat(round.id, group.id, idx, tg.id, seatNum-1);
  };

  // inline NumberInput renderer
  const num = (label, val, min, max, on) => (
    <label className="flex items-center justify-between gap-3 bg-slate-50 rounded-xl px-3 py-1.5">
      <span className="text-base sm:text-lg font-semibold text-slate-700">{label}</span>
      <div className="flex items-stretch rounded-lg border border-slate-300 overflow-hidden bg-white">
        <button type="button" onClick={()=>on(Math.max(min, val-1))}
          className="w-11 h-11 sm:w-12 sm:h-12 hover:bg-slate-100 text-3xl font-bold leading-none flex items-center justify-center">−</button>
        <input type="number" inputMode="numeric" value={val} min={min} max={max}
          onChange={e=>{const n=parseInt(e.target.value||'0',10); if(!isNaN(n)) on(Math.min(max, Math.max(min, n)));}}
          className="w-14 sm:w-16 text-center border-0 focus:ring-0 font-bold p-0 text-2xl"/>
        <button type="button" onClick={()=>on(Math.min(max, val+1))}
          className="w-11 h-11 sm:w-12 sm:h-12 hover:bg-slate-100 text-3xl font-bold leading-none flex items-center justify-center">+</button>
      </div>
    </label>
  );

  const cur = Math.min(currentRound, Math.max(0, rounds.length-1));

  return (
    <div className="min-h-screen">
      {/* Header */}
      <header className="bg-white border-b border-slate-200 no-print sticky top-0 z-30">
        <div className="max-w-7xl mx-auto px-2.5 sm:px-5 h-12 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 rounded-lg bg-gradient-to-br from-navy-600 to-teal-600 flex items-center justify-center text-white font-bold text-sm">M</div>
            <div className="font-bold tracking-tight text-ink">Mixr</div>
          </div>
          <button onClick={resetAll} className="text-slate-500 hover:text-rose-600 text-xs px-2 py-1 rounded hover:bg-rose-50 inline-flex items-center gap-1">
            <Icon name="rotate-ccw" className="w-3.5 h-3.5"/> リセット
          </button>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-2 sm:px-4 py-2 sm:py-3 space-y-2">
        {/* Settings */}
        <section className="bg-white rounded-2xl shadow-card p-2.5 sm:p-3">
          <div className="flex items-baseline justify-between mb-1.5">
            <h2 className="text-lg sm:text-xl font-bold leading-none">設定</h2>
            <div className="text-xs text-slate-500">
              総席数 {total} / 空席 {empties}{shortfall>0 && <span className="text-rose-600 ml-1">席不足 {shortfall}</span>}
            </div>
          </div>
          <div className="space-y-1.5">
            {num('参加者数', settings.participantCount, 1, 500, v=>set({participantCount:v}))}
            {num('ラウンド数', settings.roundCount, 1, 20, v=>set({roundCount:v}))}
            {num('1グループ人数', settings.groupSize, 2, 20, v=>set({groupSize:v}))}
          </div>
          <div className="mt-2 flex gap-1.5">
            <button onClick={onGenerate}
              className="flex-1 inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl bg-yellow-400 hover:bg-yellow-500 text-slate-900 font-bold shadow-soft active:scale-[.99] transition text-base">
              <Icon name="shuffle" className="w-4 h-4"/> 席順を生成
            </button>
            <button onClick={exportPDF} disabled={exporting || rounds.length===0}
              className="px-3 py-2.5 rounded-xl bg-navy-600 hover:bg-navy-700 text-white text-sm font-semibold inline-flex items-center gap-1 disabled:opacity-30 disabled:hover:bg-navy-600">
              <Icon name="file-down" className="w-4 h-4"/> {exporting ? '出力中' : 'PDF'}
            </button>
          </div>
        </section>

        {rounds.length > 0 && (
        <div ref={sheetRef} className="space-y-2">
          {/* Movement schedule */}
          <section className="print-page bg-white rounded-2xl shadow-card p-2 sm:p-2.5">
            <div className="flex items-center justify-between mb-1.5">
              <h2 className="text-lg sm:text-xl font-bold leading-none">移動順</h2>
              {!exporting && (
                <div className="inline-flex rounded-lg border border-slate-300 overflow-hidden bg-white">
                  <button onClick={()=>setCurrentRound(Math.max(0, cur-1))} disabled={cur===0}
                    className="px-2 py-1 hover:bg-slate-100 disabled:opacity-30">
                    <Icon name="chevron-left" className="w-4 h-4"/>
                  </button>
                  <button onClick={()=>setCurrentRound(Math.min(rounds.length-1, cur+1))} disabled={cur>=rounds.length-1}
                    className="px-2 py-1 hover:bg-slate-100 disabled:opacity-30">
                    <Icon name="chevron-right" className="w-4 h-4"/>
                  </button>
                </div>
              )}
            </div>
            {(() => { const cols = rounds.length >= 4 ? 1 : 2; return (
            <div className="grid gap-x-2 gap-y-0"
              style={{gridTemplateColumns: cols === 1 ? '1fr' : 'repeat(2, minmax(0, 1fr))'}}>
              {Object.keys(journey).sort((a,b)=>a-b).map((pid, i) => {
                const trail = journey[pid];
                const stripe = Math.floor(i / cols) % 2 === 1;
                return (
                  <div key={pid} className={`flex items-center gap-1.5 py-1 px-2 rounded ${stripe ? 'bg-slate-100' : ''}`}>
                    <span className="font-mono text-base font-bold text-slate-900 w-7 shrink-0">{pad2(pid)}</span>
                    <div className="flex items-center gap-0 flex-1 min-w-0">
                      {trail.map((letter, ri) => {
                        const isCurrent = ri === cur;
                        const isPast = ri < cur;
                        return (
                          <React.Fragment key={ri}>
                            {ri > 0 && <span className="text-slate-300 text-base shrink-0 px-0.5">→</span>}
                            <span className={`text-[1.6rem] font-extrabold shrink-0 leading-none ${letterColor(letter)}
                              ${isCurrent && ri > 0 ? 'underline underline-offset-4 decoration-2' :
                                isPast ? 'opacity-30 line-through' : ''}`}>
                              {letter || '—'}
                            </span>
                          </React.Fragment>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
            ); })()}
          </section>

          {/* Round pages */}
          {rounds.map((round, ri) => {
              const filled = round.groups.reduce((s,g)=>s+g.seats.filter(x=>x!==null).length, 0);
              const isCurrent = ri === cur;
              return (
                <section key={round.id} className={`print-page bg-white rounded-2xl shadow-card p-2 sm:p-2.5 ${isCurrent?'ring-2 ring-navy-400':''}`}>
                  <header className="flex items-baseline justify-between gap-2 mb-1.5 px-1">
                    <h3 className="text-xl sm:text-2xl font-extrabold tracking-tight leading-none">{round.name}</h3>
                    <div className="text-xs text-slate-500">{round.groups.length}T / {filled}名</div>
                  </header>
                  <div className="grid gap-1.5"
                    style={{gridTemplateColumns:'repeat(auto-fit, minmax(150px, 1fr))'}}>
                    {round.groups.map((group, gi) => {
                      const seats = group.seats;
                      const W = 200, H = 200, tableW = 110, tableH = 60;
                      const positions = chairPositions(seats.length, W, H, tableW, tableH);
                      const letter = TABLE_LETTERS[gi];
                      return (
                        <div key={group.id} className="bg-slate-50 rounded-lg border border-slate-200 p-1.5">
                          <div className="flex items-center justify-between mb-0.5 px-0.5">
                            <h4 className={`text-sm sm:text-base font-extrabold leading-none ${letterColor(letter)}`}>{group.name}</h4>
                            <span className="text-xs text-slate-500">{seats.filter(x=>x!==null).length}/{seats.length}</span>
                          </div>
                          <div className="relative w-full" style={{aspectRatio:'1/1'}}>
                            <svg viewBox={`0 0 ${W} ${H}`} className="absolute inset-0 w-full h-full">
                              <rect x={W/2-tableW/2} y={H/2-tableH/2} width={tableW} height={tableH} rx="10"
                                fill="#fff" stroke="#cbd5e1" strokeWidth="1.5"/>
                            </svg>
                            {seats.map((id, i) => {
                              const pos = positions[i]; const isEmpty = id === null;
                              return (
                                <button key={i}
                                  onClick={()=>onChairClick(round, group, i)}
                                  className={`chair ${isEmpty?'chair-empty':'chair-filled'}`}
                                  title={isEmpty?'空席（タップで入替）':`${pad2(id)}（タップで入替）`}
                                  style={{
                                    left:`${(pos.x/W)*100}%`, top:`${(pos.y/H)*100}%`,
                                    width:'17%', height:'17%',
                                    fontSize:'clamp(12px,2.8vw,17px)',
                                  }}>
                                  {isEmpty ? '空' : pad2(id)}
                                </button>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </section>
              );
            })}
        </div>
        )}
      </main>

      {toast && (
        <div className="fixed bottom-3 left-1/2 -translate-x-1/2 bg-ink text-white px-4 py-2 rounded-lg shadow-soft text-sm z-50 no-print">
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
